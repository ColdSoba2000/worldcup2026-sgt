name: Fetch World Cup Scores

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-scores
  cancel-in-progress: false

jobs:
  fetch-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch World Cup matches from football-data.org
        env:
          RAW_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          TOKEN=$(printf '%s' "$RAW_TOKEN" | tr -d '[:space:]')
          if [ -z "$TOKEN" ]; then
            echo "::error::FOOTBALL_DATA_TOKEN secret is not set."
            exit 1
          fi
          CODE=$(curl -s -w "%{http_code}" \
            "https://api.football-data.org/v4/competitions/WC/matches" \
            -H "X-Auth-Token: $TOKEN" \
            -o data.json --max-time 25 --retry 2 --retry-delay 5)
          echo "HTTP status: $CODE"
          if [ "$CODE" != "200" ]; then
            echo "::error::API returned $CODE. Response body below:"
            cat data.json
            exit 1
          fi
          COUNT=$(python3 -c "import json; print(len(json.load(open('data.json'))['matches']))")
          echo "Fetched $COUNT matches"
          if [ "$COUNT" -lt 1 ]; then
            echo "::error::Feed returned 0 matches - not committing."
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update scores"
          git push
